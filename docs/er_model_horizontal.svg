<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1200" viewBox="0 0 2200 1200">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 700 42px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 22px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .entity { fill: #f8fafc; stroke: #0f172a; stroke-width: 2.5; rx: 18; ry: 18; }
      .entity-head { fill: #e2e8f0; stroke: #0f172a; stroke-width: 2.5; rx: 18; ry: 18; }
      .entity-title { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .field { font: 500 24px 'Consolas', 'Courier New', monospace; fill: #111827; }
      .field-muted { font: 500 22px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .rel { stroke: #1e293b; stroke-width: 3.5; fill: none; }
      .rel-label { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .rel-note { font: 500 20px 'Segoe UI', Arial, sans-serif; fill: #475569; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#1e293b" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="2200" height="1200" />

  <text class="title" x="60" y="68">ER-модель БД: Система контроля качества продукции</text>
  <text class="subtitle" x="60" y="104">Горизонтальная схема таблиц, ключей и связей (1:N)</text>

  <!-- USERS -->
  <rect class="entity" x="60" y="140" width="430" height="340" />
  <rect class="entity-head" x="60" y="140" width="430" height="74" />
  <text class="entity-title" x="80" y="188">USERS</text>
  <text class="field" x="80" y="248">id BIGINT PK</text>
  <text class="field" x="80" y="286">full_name VARCHAR</text>
  <text class="field" x="80" y="324">email VARCHAR UNIQUE</text>
  <text class="field" x="80" y="362">password_hash VARCHAR</text>
  <text class="field" x="80" y="400">role ENUM(ADMIN, QA, LAB)</text>
  <text class="field-muted" x="80" y="445">Учетные записи и роли доступа</text>

  <!-- PRODUCTS -->
  <rect class="entity" x="610" y="110" width="460" height="280" />
  <rect class="entity-head" x="610" y="110" width="460" height="74" />
  <text class="entity-title" x="630" y="158">PRODUCTS</text>
  <text class="field" x="630" y="218">id BIGINT PK</text>
  <text class="field" x="630" y="256">name VARCHAR</text>
  <text class="field" x="630" y="294">code VARCHAR UNIQUE</text>
  <text class="field-muted" x="630" y="338">Справочник продукции</text>

  <!-- METRICS -->
  <rect class="entity" x="610" y="450" width="460" height="280" />
  <rect class="entity-head" x="610" y="450" width="460" height="74" />
  <text class="entity-title" x="630" y="498">METRICS</text>
  <text class="field" x="630" y="558">id BIGINT PK</text>
  <text class="field" x="630" y="596">name VARCHAR UNIQUE</text>
  <text class="field" x="630" y="634">unit VARCHAR</text>
  <text class="field-muted" x="630" y="678">Справочник показателей</text>

  <!-- NORMS -->
  <rect class="entity" x="1180" y="250" width="470" height="360" />
  <rect class="entity-head" x="1180" y="250" width="470" height="74" />
  <text class="entity-title" x="1200" y="298">NORMS</text>
  <text class="field" x="1200" y="358">id BIGINT PK</text>
  <text class="field" x="1200" y="396">product_id BIGINT FK → PRODUCTS.id</text>
  <text class="field" x="1200" y="434">metric_id BIGINT FK → METRICS.id</text>
  <text class="field" x="1200" y="472">min_value DOUBLE</text>
  <text class="field" x="1200" y="510">max_value DOUBLE</text>
  <text class="field-muted" x="1200" y="552">UNIQUE(product_id, metric_id)</text>
  <text class="field-muted" x="1200" y="584">Нормативы по продукту и показателю</text>

  <!-- BATCHES -->
  <rect class="entity" x="1720" y="120" width="430" height="320" />
  <rect class="entity-head" x="1720" y="120" width="430" height="74" />
  <text class="entity-title" x="1740" y="168">BATCHES</text>
  <text class="field" x="1740" y="228">id BIGINT PK</text>
  <text class="field" x="1740" y="266">product_id BIGINT FK → PRODUCTS.id</text>
  <text class="field" x="1740" y="304">batch_number VARCHAR</text>
  <text class="field" x="1740" y="342">created_at TIMESTAMP</text>
  <text class="field" x="1740" y="380">status ENUM(OK, WARNING, FAIL)</text>
  <text class="field-muted" x="1740" y="420">Карточки партий продукции</text>

  <!-- MEASUREMENTS -->
  <rect class="entity" x="1660" y="520" width="520" height="420" />
  <rect class="entity-head" x="1660" y="520" width="520" height="74" />
  <text class="entity-title" x="1680" y="568">MEASUREMENTS</text>
  <text class="field" x="1680" y="628">id BIGINT PK</text>
  <text class="field" x="1680" y="666">batch_id BIGINT FK → BATCHES.id</text>
  <text class="field" x="1680" y="704">metric_id BIGINT FK → METRICS.id</text>
  <text class="field" x="1680" y="742">created_by BIGINT FK → USERS.id</text>
  <text class="field" x="1680" y="780">value DOUBLE</text>
  <text class="field" x="1680" y="818">measured_at TIMESTAMP</text>
  <text class="field-muted" x="1680" y="872">Фактические лабораторные измерения</text>

  <!-- Relations -->
  <path class="rel" marker-end="url(#arrow)" d="M1070 245 L1180 360" />
  <text class="rel-label" x="1090" y="290">1 : N</text>
  <text class="rel-note" x="1020" y="322">PRODUCTS → NORMS</text>

  <path class="rel" marker-end="url(#arrow)" d="M1070 560 L1180 470" />
  <text class="rel-label" x="1086" y="540">1 : N</text>
  <text class="rel-note" x="980" y="575">METRICS → NORMS</text>

  <path class="rel" marker-end="url(#arrow)" d="M1070 220 L1720 250" />
  <text class="rel-label" x="1360" y="218">1 : N</text>
  <text class="rel-note" x="1260" y="196">PRODUCTS → BATCHES</text>

  <path class="rel" marker-end="url(#arrow)" d="M1935 440 L1915 520" />
  <text class="rel-label" x="1950" y="490">1 : N</text>
  <text class="rel-note" x="1978" y="504">BATCHES → MEASUREMENTS</text>

  <path class="rel" marker-end="url(#arrow)" d="M1070 610 L1660 700" />
  <text class="rel-label" x="1328" y="642">1 : N</text>
  <text class="rel-note" x="1210" y="678">METRICS → MEASUREMENTS</text>

  <path class="rel" marker-end="url(#arrow)" d="M490 310 L620 310 L620 885 L1660 760" />
  <text class="rel-label" x="650" y="350">1 : N</text>
  <text class="rel-note" x="700" y="380">USERS → MEASUREMENTS (created_by)</text>

  <!-- Footer -->
  <text class="subtitle" x="60" y="1135">
    Логика: партия (BATCHES) выбирает продукт (PRODUCTS), измерения (MEASUREMENTS) сравниваются с нормами (NORMS) по паре (product_id, metric_id).
  </text>
</svg>
